<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Photo Service - Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">📸</span>
          <span class="logo-text">PhotoDash</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-page="orders">
          <span class="nav-icon">📋</span>
          <span>Orders</span>
        </a>
        <a href="#" class="nav-item" data-page="analytics">
          <span class="nav-icon">📈</span>
          <span>Analytics</span>
        </a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1>Orders Dashboard</h1>
        <div class="topbar-actions">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search orders..." oninput="renderTable()">
          </div>
          <button class="btn-refresh" onclick="init()">🔄 Refresh</button>
        </div>
      </header>

      <div class="content">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="charts-grid">
          <div class="card">
            <div class="card-header">
              <h3>Order Status</h3>
            </div>
            <div class="card-body chart-container">
              <canvas id="statusChart"></canvas>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <h3>Revenue by Date</h3>
            </div>
            <div class="card-body chart-container">
              <canvas id="revenueChart"></canvas>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <h3>Payment Methods</h3>
            </div>
            <div class="card-body chart-container">
              <canvas id="paymentChart"></canvas>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <h3>Top Products</h3>
            </div>
            <div class="card-body chart-container">
              <canvas id="productChart"></canvas>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h3>All Orders</h3>
            <div class="filter-group">
              <select id="statusFilter" onchange="renderTable()">
                <option value="all">All Status</option>
                <option value="completed">Completed</option>
                <option value="processing">Processing</option>
              </select>
              <select id="courierFilter" onchange="renderTable()">
                <option value="all">All Couriers</option>
              </select>
            </div>
          </div>
          <div class="card-body">
            <div class="table-wrapper">
              <table class="orders-table">
                <thead>
                  <tr>
                    <th onclick="sortTable('order_number')">Order #</th>
                    <th onclick="sortTable('customer')">Customer</th>
                    <th onclick="sortTable('product')">Product</th>
                    <th onclick="sortTable('total_amount')">Total</th>
                    <th onclick="sortTable('payment_method')">Payment</th>
                    <th onclick="sortTable('delivery_status')">Delivery</th>
                    <th onclick="sortTable('order_status')">Status</th>
                    <th onclick="sortTable('date')">Date</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="ordersBody"></tbody>
              </table>
            </div>
            <div class="table-footer">
              <span id="tableInfo"></span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="orderModal" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Order Detail</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
